name: Publish to npm

on:
  push:
    branches: [master]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Smoke test build
        run: |
          node dist/bin.js --version
          node dist/bin.js --help

      - name: Determine version
        id: version
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          LAST_TAG=$(git describe --tags --abbrev=0 --match "v*" 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            # First publish — use version from package.json as-is
            NEW_VERSION=$(node -p "require('./package.json').version")
            echo "First publish — using v${NEW_VERSION} from package.json"
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --format="%s")

            if [ -z "$COMMITS" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "No new commits since ${LAST_TAG}"
              exit 0
            fi

            echo "Commits since ${LAST_TAG}:"
            echo "$COMMITS"
            echo ""

            BUMP="patch"
            if echo "$COMMITS" | grep -qE "^.+!:|BREAKING CHANGE"; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
              BUMP="minor"
            fi

            npm version "$BUMP" --no-git-tag-version
            NEW_VERSION=$(node -p "require('./package.json').version")
          fi

          # Check if version already exists on npm
          while npm view "${PACKAGE_NAME}@${NEW_VERSION}" version 2>/dev/null; do
            echo "v${NEW_VERSION} already on npm, bumping patch..."
            npm version patch --no-git-tag-version
            NEW_VERSION=$(node -p "require('./package.json').version")
          done

          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing v${NEW_VERSION}"

      - name: Publish
        if: steps.version.outputs.skip != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag and push release
        if: steps.version.outputs.skip != 'true'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add package.json package-lock.json
          git diff --cached --quiet && echo "No version changes to commit" || git commit -m "chore: release v${VERSION} [skip ci]"
          git tag "v${VERSION}"
          git push && git push --tags

      - name: Create GitHub release
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            --latest
